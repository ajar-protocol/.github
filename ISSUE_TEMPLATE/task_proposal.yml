name: Task proposal
description: Propose new planned work for a phase or repo.
title: "[task] "
labels: ["task", "needs-triage"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this task needed?
    validations:
      required: true
  - type: input
    id: phase
    attributes:
      label: Phase or repo
      placeholder: Phase 1 / ajar-gateway
    validations:
      required: true
  - type: textarea
    id: deliverable
    attributes:
      label: Deliverable
      description: What should exist when this is done?
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      description: How will maintainers verify completion?
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies or blockers
